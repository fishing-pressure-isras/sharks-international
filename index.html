<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jessica T. Corsso</title>
  <style>
    :root {
      --bg-start: #0b1d3a;
      --bg-end: #0f3460;
      --card: rgba(255, 255, 255, 0.07);
      --card-hover: rgba(255, 255, 255, 0.14);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-border-hover: rgba(255, 255, 255, 0.3);
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.6);
      --accent: #4fc3f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 50%, #1a5276 100%);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 1.5rem 3rem;
      text-align: center;
    }

    /* ── Avatar ── */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.02em;
      box-shadow: 0 4px 20px rgba(79, 195, 247, 0.3);
    }

    .name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--white);
      transition: all 0.25s ease;
      backdrop-filter: blur(6px);
    }

    .link-card:hover {
      background: var(--card-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.25);
    }

    .link-icon {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .link-icon.poster  { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
    .link-icon.abstract { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; }
    .link-icon.cv       { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }

    .link-text {
      text-align: left;
    }

    .link-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .link-desc {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .link-arrow {
      margin-left: auto;
      font-size: 1.1rem;
      color: var(--muted);
      transition: transform 0.2s ease;
    }

    .link-card:hover .link-arrow {
      transform: translateX(3px);
      color: var(--white);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Subtle animated bg dots ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(79,195,247,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(46,204,113,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; }

    @media (max-width: 480px) {
      .container { padding: 2rem 1rem 2.5rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="avatar">JC</div>
  <h1 class="name">Jessica T. Corsso</h1>
  <p class="tagline">Marine scientist &amp; data analyst<br>Fisheries · Sharks &amp; Rays · ISRAs</p>

  <div class="links">

    <a class="link-card" href="https://fishing-pressure-isras.github.io/three-dimensional_fishing_pressure_within_isras/poster.pdf" target="_blank" rel="noopener">

      </div>
      <div class="link-text">
        <div class="link-title">Abstract</div>
        <div class="link-desc">Study objectives, methods &amp; results</div>

    <a class="link-card" href="https://fishing-pressure-isras.github.io/jessica-corsso-cv/" target="_blank" rel="noopener">
      <div class="link-icon cv">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="link-text">
        <div class="link-title">Curriculum Vitae</div>
        <div class="link-desc">Education, experience &amp; publications</div>
      </div>
      <span class="link-arrow">&#8250;</span>
    </a>

  </div>

  <div class="footer">jessicacorsso.pesq@gmail.com</div>

</div>

</body>
</html>
